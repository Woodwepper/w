<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Factory Lab Default Template</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #11161b;
      --panel: #1a2228;
      --panel-2: #202a31;
      --line: #3b4a50;
      --text: #e8ece7;
      --muted: #9caaa3;
      --copper: #c9824b;
      --brass: #d8b45f;
      --andesite: #7f8b86;
      --good: #79c98d;
      --bad: #df806f;
      --radius: 8px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background:
        linear-gradient(120deg, rgba(201, 130, 75, 0.08), transparent 36%),
        linear-gradient(180deg, #0e1318, var(--bg));
      color: var(--text);
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 16px 20px;
      background: rgba(17, 22, 27, 0.94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    input, select, button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      padding: 0 10px;
    }

    button {
      cursor: pointer;
      background: #243039;
    }

    button.active {
      border-color: var(--copper);
      color: #ffe1c7;
    }

    main {
      display: grid;
      grid-template-columns: 280px 1fr;
      min-height: calc(100vh - 73px);
    }

    aside {
      border-right: 1px solid var(--line);
      background: rgba(26, 34, 40, 0.72);
      padding: 16px;
      overflow: auto;
    }

    .content {
      padding: 16px;
      overflow: auto;
    }

    .stats {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .stat strong { color: var(--brass); }

    .tabs {
      display: grid;
      gap: 8px;
    }

    .section-title {
      margin: 18px 0 8px;
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--panel), var(--panel-2));
      overflow: hidden;
    }

    .card-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .name {
      font-weight: 700;
      line-height: 1.2;
    }

    .id {
      color: var(--muted);
      font-size: 12px;
      margin-top: 3px;
      word-break: break-word;
    }

    .badge {
      align-self: start;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 999px;
      padding: 3px 8px;
      color: #1a1410;
      background: var(--brass);
      font-size: 12px;
      white-space: nowrap;
    }

    .badge.machine { background: #9aa9b0; }
    .badge.recipe { background: #d48a55; }
    .badge.energy { background: #79b8c9; }
    .badge.producer { background: #9ac17c; }
    .badge.node { background: #b79b70; }

    .card-body {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .kv {
      display: grid;
      gap: 4px;
    }

    .label {
      color: var(--muted);
      font-size: 12px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      padding: 3px 7px;
      font-size: 12px;
      color: #d8dfda;
    }

    .flow {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      font-size: 13px;
    }

    .flow span {
      padding: 4px 7px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .arrow { color: var(--copper); }
    .empty { color: var(--muted); }
    .error {
      border: 1px solid rgba(223, 128, 111, 0.45);
      background: rgba(223, 128, 111, 0.12);
      color: #ffd1c9;
      padding: 12px;
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    @media (max-width: 860px) {
      header, main { display: block; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
      .toolbar { justify-content: flex-start; margin-top: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Factory Lab Default Template</h1>
      <div class="sub">Visor local de objetos, recetas, maquinas, modulos, nodos, productores y energia.</div>
    </div>
    <div class="toolbar">
      <input id="search" type="search" placeholder="Buscar..." />
      <select id="category">
        <option value="all">Todo</option>
        <option value="normal">Items normales</option>
        <option value="entity">Entidades</option>
      </select>
    </div>
  </header>

  <main>
    <aside>
      <div class="stats" id="stats"></div>
      <div class="section-title">Secciones</div>
      <div class="tabs" id="tabs"></div>
      <div class="section-title">Flujo principal</div>
      <div class="card">
        <div class="card-body">
          <div class="flow">
            <span>iron_deposit</span><b class="arrow">></b><span>mine</span><b class="arrow">></b><span>raw_iron</span><b class="arrow">></b><span>crushing</span><b class="arrow">></b><span>smelting</span><b class="arrow">></b><span>pressing</span><b class="arrow">></b><span>iron_sheet</span>
          </div>
        </div>
      </div>
    </aside>

    <section class="content">
      <div id="error"></div>
      <div class="grid" id="cards"></div>
    </section>
  </main>

  <script>
    const files = {
      objects: "objects.json",
      machines: "machines.json",
      recipes: "recipes.json",
      modules: "modules.json",
      factory_levels: "factory_levels.json",
      resource_nodes: "resource_nodes.json",
      producers: "producers.json",
      su_producers: "su_producers.json",
      su_units: "su_units.json"
    };

    const labels = {
      objects: "Objetos",
      machines: "Maquinas",
      recipes: "Recetas",
      modules: "Modulos",
      factory_levels: "Niveles fabrica",
      resource_nodes: "Resource nodes",
      producers: "Producers",
      su_producers: "SU producers",
      su_units: "SU units"
    };

    let data = {};
    let active = "objects";

    const $ = (id) => document.getElementById(id);

    function list(section) {
      return Object.values(data[section] || {});
    }

    function chipList(items) {
      if (!items || items.length === 0) return `<span class="empty">none</span>`;
      return `<div class="chips">${items.map(item => `<span class="chip">${escapeHtml(String(item))}</span>`).join("")}</div>`;
    }

    function kv(label, value) {
      if (value === undefined || value === null || value === "" || value === false) return "";
      return `<div class="kv"><div class="label">${label}</div><div>${value}</div></div>`;
    }

    function itemMap(map) {
      const entries = Object.entries(map || {});
      if (entries.length === 0) return `<span class="empty">none</span>`;
      return chipList(entries.map(([key, value]) => `${key} x${value}`));
    }

    function badge(section, item) {
      if (section === "recipes") return `<span class="badge recipe">recipe</span>`;
      if (section === "machines") return `<span class="badge machine">machine</span>`;
      if (section === "resource_nodes") return `<span class="badge node">node</span>`;
      if (section === "producers") return `<span class="badge producer">producer</span>`;
      if (section.startsWith("su_")) return `<span class="badge energy">energy</span>`;
      return `<span class="badge">${escapeHtml(item.category || item.stack_kind || section)}</span>`;
    }

    function renderStats() {
      $("stats").innerHTML = Object.keys(files).map(section => `
        <div class="stat"><span>${labels[section]}</span><strong>${list(section).length}</strong></div>
      `).join("");
    }

    function renderTabs() {
      $("tabs").innerHTML = Object.keys(files).map(section => `
        <button class="${section === active ? "active" : ""}" data-section="${section}">${labels[section]}</button>
      `).join("");
      document.querySelectorAll("[data-section]").forEach(button => {
        button.addEventListener("click", () => {
          active = button.dataset.section;
          render();
        });
      });
    }

    function renderCard(section, item) {
      const body = [];

      if (section === "objects") {
        body.push(kv("Tipo", `${item.stack_kind}${item.entity_type ? " / " + item.entity_type : ""}`));
        body.push(kv("Visual", `${item.visual_key || "-"} ${item.model_key ? "/ " + item.model_key : ""}`));
        body.push(kv("Default data", `<code>${escapeHtml(JSON.stringify(item.default_entity_data || {}))}</code>`));
      }

      if (section === "machines") {
        body.push(kv("SU", item.su_cost));
        body.push(kv("Build cost", itemMap(item.build_cost)));
        body.push(kv("Allowed recipes", chipList(item.allowed_recipes)));
      }

      if (section === "recipes") {
        body.push(kv("Maquinas", chipList(item.required_machines)));
        body.push(kv("Duracion", `${item.duration}s`));
        body.push(`<div class="flow"><span>${itemMap(item.input_items)}</span><b class="arrow">></b><span>${itemMap(item.output_items)}</span></div>`);
      }

      if (section === "modules") {
        body.push(kv("Maquinas permitidas", chipList(item.allowed_machine_types)));
        body.push(kv("Recetas", chipList(item.allowed_recipes)));
      }

      if (section === "factory_levels") {
        body.push(kv("Module slots", item.module_slots));
        body.push(kv("Machine slots/modulo", item.machine_slots_per_module));
        body.push(kv("Upgrade cost", itemMap(item.upgrade_cost)));
      }

      if (section === "resource_nodes") {
        body.push(kv("Produce", item.resource_type));
        body.push(kv("Richness / hardness", `${item.default_richness} / ${item.default_hardness}`));
        body.push(kv("Traits", chipList(item.traits)));
      }

      if (section === "producers") {
        body.push(kv("Nodos", chipList(item.allowed_node_types)));
        body.push(kv("Maquinas", chipList(item.allowed_machine_types)));
        body.push(kv("Duracion / output", `${item.base_duration}s / ${item.base_output_amount}`));
      }

      if (section === "su_producers") {
        body.push(kv("Unidades", chipList(item.allowed_unit_types)));
        body.push(kv("Niveles", chipList(Object.values(item.levels || {}).map(level => `L${level.level}: ${level.unit_slots} slots`))));
      }

      if (section === "su_units") {
        body.push(kv("SU output", item.su_output));
        body.push(kv("Inputs", itemMap(item.input_items)));
        body.push(kv("Build cost", itemMap(item.build_cost)));
      }

      return `
        <article class="card">
          <div class="card-head">
            <div>
              <div class="name">${escapeHtml(item.name || item.id)}</div>
              <div class="id">${escapeHtml(item.id)}</div>
            </div>
            ${badge(section, item)}
          </div>
          <div class="card-body">${body.filter(Boolean).join("")}</div>
        </article>
      `;
    }

    function render() {
      renderStats();
      renderTabs();
      const query = $("search").value.trim().toLowerCase();
      const category = $("category").value;
      const items = list(active).filter(item => {
        const haystack = JSON.stringify(item).toLowerCase();
        if (query && !haystack.includes(query)) return false;
        if (active === "objects" && category !== "all" && item.stack_kind !== category) return false;
        return true;
      });

      $("cards").innerHTML = items.map(item => renderCard(active, item)).join("") || `<div class="empty">Sin resultados.</div>`;
    }

    function escapeHtml(value) {
      return value.replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    async function loadAll() {
      try {
        const entries = await Promise.all(Object.entries(files).map(async ([key, file]) => {
          const response = await fetch(file);
          if (!response.ok) throw new Error(`${file}: ${response.status}`);
          return [key, await response.json()];
        }));
        data = Object.fromEntries(entries);
        render();
      } catch (error) {
        $("error").innerHTML = `<div class="error">No pude cargar los JSON. Sirve esta carpeta con <code>python -m http.server</code> y abre <code>http://127.0.0.1:8000/viewer.html</code>.<br>${escapeHtml(error.message)}</div>`;
      }
    }

    $("search").addEventListener("input", render);
    $("category").addEventListener("change", render);
    loadAll();
  </script>
</body>
</html>
